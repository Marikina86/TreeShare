name: Dependency Security Scan

on:
  push:
    branches: [main]
    paths:
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "**/package.json"
  pull_request:
    paths:
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "**/package.json"
  schedule:
    - cron: "0 8 * * 1"  # every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Save audit report (always, for artifact upload on failure)
        if: always()
        run: pnpm audit --json > /tmp/audit-report.json 2>&1 || true

      - name: Run dependency audit (fail on moderate+)
        run: pnpm audit --audit-level=moderate

      - name: Upload audit report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_id }}
          path: /tmp/audit-report.json
          retention-days: 30
